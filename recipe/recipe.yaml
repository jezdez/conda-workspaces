schema_version: 1

context:
  version: ${{ env.get("SETUPTOOLS_SCM_PRETEND_VERSION", default="0.0.0dev0") }}
  python_min: "3.10"

package:
  name: conda-workspaces
  version: ${{ version }}

source:
  path: ..

build:
  number: 0
  noarch: python
  script:
    - export SETUPTOOLS_SCM_PRETEND_VERSION=${{ version }}
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - cw = conda_workspaces.__main__:main
      - ct = conda_workspaces.__main__:main_task

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling >=1.12.2
    - hatch-vcs >=0.2.0
    - pip
  run:
    - python >=${{ python_min }}
    - conda >=24.7
    - conda-lockfiles >=0.1
    - conda-spawn >=0.1.0
    - rich >=13.0
    - tomlkit >=0.13
    - platformdirs >=3.0
    - jinja2 >=3.0
    - packaging >=24.0
  run_constraints:
    - conda-pypi >=0.5.0
    - conda-rattler-solver >=0.0.6

tests:
  - python:
      imports:
        - conda_workspaces
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - cw --help
      - ct --help

about:
  summary: Project-scoped multi-environment workspace management for conda, with pixi compatibility
  description: |
    conda-workspaces brings project-scoped multi-environment workspaces and
    a task runner to conda as a plugin. Define environments, features,
    dependencies, and tasks in a single manifest (conda.toml, pixi.toml,
    or pyproject.toml) and let conda handle the solving and installation.

    Optional dependencies for additional features:
    - conda-pypi: PyPI dependency resolution and installation
    - conda-rattler-solver: rattler solver backend (required for PyPI deps)
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://conda-incubator.github.io/conda-workspaces/
  repository: https://github.com/conda-incubator/conda-workspaces
  documentation: https://conda-incubator.github.io/conda-workspaces/

extra:
  recipe-maintainers:
    - jezdez
    - travishathaway
